<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavi Exchange Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<div class="footer-scroller">
    <div class="scrolling-text">
        KAVI EXCHANGE AND TRANSFER <span class="phone">0750 221 1912 - 0750 211 1912</span> &nbsp;&nbsp;&nbsp;&nbsp; 
        KAVI EXCHANGE AND TRANSFER <span class="phone">0750 221 1912 - 0750 211 1912</span>
    </div>
</div>
<body>

<div class="main-container">
    <div class="header">
        <img src="https://kaviexchange.com/assets/images/logo.png" alt="Kavi Logo" class="logo">
        <div class="date-time">
            <p>24/04/2026 FRIDAY</p>
            <p>03:06 PM</p>
        </div>
    </div>

    <div class="table-header">
        <div class="header-item">CURRENCY</div>
        <div class="header-item">BUY</div>
        <div class="header-item">SALE</div>
    </div>

    <div class="exchange-table">
        <div class="row">
            <div class="cell currency"><img src="https://flagcdn.com/w40/us.png"> USD</div>
            <div class="cell buy">154,750</div>
            <div class="cell sale">155,650</div>
        </div>

        <div class="row">
            <div class="cell currency"><img src="https://flagcdn.com/w40/eu.png"> EUR</div>
            <div class="cell buy">116</div>
            <div class="cell sale">117.25</div>
        </div>

        <div class="row">
            <div class="cell currency"><img src="https://flagcdn.com/w40/gb.png"> GBP</div>
            <div class="cell buy">133</div>
            <div class="cell sale">134.5</div>
        </div>
        
        </div>
</div>

</body>
</html>
